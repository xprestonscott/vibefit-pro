<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(id, size) {
  const canvas = document.getElementById(id)
  const ctx = canvas.getContext('2d')
  const r = size * 0.22

  // Background
  ctx.fillStyle = '#080810'
  ctx.beginPath()
  ctx.roundRect(0, 0, size, size, r)
  ctx.fill()

  // Gradient circle
  const grad = ctx.createLinearGradient(size*.2, size*.2, size*.8, size*.8)
  grad.addColorStop(0, '#39FF14')
  grad.addColorStop(1, '#00C851')
  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.roundRect(size*.15, size*.15, size*.7, size*.7, r*.8)
  ctx.fill()

  // Lightning bolt
  ctx.fillStyle = '#080810'
  ctx.font = `bold ${size*.45}px Arial`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('⚡', size/2, size/2)

  return canvas.toDataURL('image/png')
}

const img192 = drawIcon('c192', 192)
const img512 = drawIcon('c512', 512)

// Download both
function download(dataUrl, name) {
  const a = document.createElement('a')
  a.href = dataUrl
  a.download = name
  a.click()
}

download(img192, 'icon-192.png')
setTimeout(() => download(img512, 'icon-512.png'), 500)
</script>
<p>Icons downloading... save them to <strong>vibefit-pro/public/</strong></p>
</body>
</html>
